apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wallet-service.fullname" . }}-db
  labels:
    {{- include "wallet-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: {{ .Values.database.username | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.database.password | quote }}

